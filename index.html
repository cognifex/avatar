<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deadpan Comedy Avatar v1</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <aside class="panel">
        <h1>Deadpan Comedy Avatar v1</h1>
        <p>Minimaler 2D-Avatar mit Webcam-Tracking, Peak-Engine und OBS-tauglichem Output.</p>

        <div class="group">
          <button id="startCameraBtn">Kamera starten</button>
          <button id="calibrateBtn">2s neutral kalibrieren</button>
          <label>Style-Profil
            <select id="styleProfile">
              <option value="deadpan">Deadpan</option>
              <option value="balanced">Balanced</option>
              <option value="overreact">Overreact</option>
            </select>
          </label>
          <label class="toggle"><input id="transparentToggle" type="checkbox" checked /> Transparenter Output</label>
        </div>

        <div class="group">
          <strong>Status</strong>
          <p id="status">No Camera</p>
          <small>States: No Camera · Low Light / Face Lost · Tracking OK · Live</small>
        </div>
      </aside>

      <section class="stage">
        <video id="camera" autoplay playsinline muted></video>
        <canvas id="avatar" width="960" height="540"></canvas>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
