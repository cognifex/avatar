<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avatar Audio Canvas Tool</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="controls">
        <h1>Avatar Canvas für Streaming</h1>
        <p>
          Links zeichnen, Gesicht erkennen und rechts den Live-Output sehen.
          Der neutrale Ausdruck im Output bleibt exakt dein gezeichnetes Gesicht.
        </p>

        <div class="toolbar">
          <label>
            Pinselgröße
            <input id="brushSize" type="range" min="1" max="24" value="4" />
          </label>
          <button id="clearBtn" type="button">Zeichnung löschen</button>
          <button id="detectBtn" type="button">Gesicht erkennen</button>
          <button id="copyBtn" type="button">In Output übernehmen</button>
          <button id="micBtn" type="button">Mikrofon starten</button>
          <button id="stopMicBtn" type="button" disabled>Mikrofon stoppen</button>
        </div>

        <label class="toggle">
          <input id="transparentBg" type="checkbox" />
          Transparenter Output-Hintergrund (OBS)
        </label>

        <p id="status" class="status">
          Zeichne links deinen Avatar. Danach "Gesicht erkennen" und "In Output übernehmen".
        </p>
      </section>

      <section class="stage" aria-label="Zeichen- und Output-Flächen">
        <article>
          <h2>Zeichen-Canvas</h2>
          <div class="canvas-wrap" id="drawWrap">
            <canvas id="drawCanvas" width="960" height="540"></canvas>
            <canvas id="drawGuideCanvas" width="960" height="540"></canvas>
          </div>
        </article>

        <article>
          <h2>Output-Canvas (OBS)</h2>
          <div class="canvas-wrap" id="outputWrap">
            <canvas id="outputCanvas" width="960" height="540"></canvas>
          </div>
        </article>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
